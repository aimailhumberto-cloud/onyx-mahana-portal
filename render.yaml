services:
  - type: web
    name: mahana-portal
    env: node
    buildCommand: npm ci && npm run build
    startCommand: node server/server.js
    disk:
      name: mahana-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3100
      - key: ALLOWED_ORIGINS
        value: "https://mahana-portal.onrender.com"